name: CI · build + astro check

on:
  pull_request:
    branches: [main, master]
  push:
    branches: ["**"]

jobs:
  check:
    name: Type check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify output
        run: |
          test -d dist || (echo "❌ dist/ not created"; exit 1)
          test -f dist/index.html || (echo "❌ index.html missing"; exit 1)
          test -f dist/sitemap-index.xml || (echo "❌ sitemap missing"; exit 1)
          echo "✅ Build artifacts verified"
          find dist -name '*.html' | wc -l | xargs -I {} echo "Pages built: {}"
