<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>AiOars 船匠 · 别堆人, 造船</title>

  <!-- 背景 Ink -->
  <rect width="1200" height="630" fill="#1B1B1B"/>

  <!-- AiOars mark (rounded-square bracket) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="96" height="96" rx="26" fill="none" stroke="#FEF297" stroke-width="10"/>
  </g>

  <!-- AiOars wordmark + 船匠 -->
  <g transform="translate(210, 110)">
    <text x="0" y="0" font-family="Outfit, sans-serif" font-size="56" font-weight="600" fill="#FDFCF9">AiOars</text>
    <text x="0" y="40" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="500" fill="#9A9A9A" letter-spacing="8">船  匠</text>
  </g>

  <!-- 大 tagline -->
  <text x="80" y="340" font-family="Noto Sans SC, sans-serif" font-size="104" font-weight="700" fill="#FDFCF9" letter-spacing="4">别堆人，造船。</text>

  <!-- English tagline with yellow highlight -->
  <text x="80" y="430" font-family="Outfit, sans-serif" font-size="54" font-weight="500" fill="#FEF297">Don't hire. Ship.</text>

  <!-- Sub -->
  <text x="80" y="500" font-family="Noto Sans SC, sans-serif" font-size="26" font-weight="400" fill="#C4C4C4">
    14 天交付跨境电商 AI 工作流 · 代码 100% 归你 · 透明定价
  </text>

  <!-- Signal strip at bottom -->
  <rect x="0" y="620" width="1200" height="10" fill="#FEF297"/>

  <!-- URL -->
  <text x="80" y="580" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" fill="#FEF297">aioars.com</text>
</svg>
